name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: python -m ruff check winegpt/ scripts/ tests/

      - name: Run mypy (typecheck)
        run: python -m mypy winegpt/ scripts/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v -p no:langsmith
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}